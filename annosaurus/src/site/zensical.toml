[project]
site_name = "Annosaurus"
site_description = "Annosaurus - Annotation Service for VARS"
site_author = "Brian Schlining"
repo_name = "mbari-org/annosaurus"
repo_url = "https://github.com/mbari-org/annosaurus"
nav = [
  { "Home" = "index.md" },
  { "How-to" = [
    { "Security Handshake" = "howto/security_handshake.md" },
    { "Fetch Annotations" = "howto/fetch_annotations.md" },
  ]},
  { "DeepWiki" = "https://deepwiki.com/mbari-org/annosaurus" },
  { "About" = [
    { "GitHub" = "https://github.com/mbari-media-management/annosaurus" },
  ]},
  { "MBARI Docs" = "https://docs.mbari.org" },
]

[project.theme]
name = "material"
logo = "assets/images/mbari-logo.png"
# favicon = "assets/images/favicon.ico"
features = [
    "navigation.instant",
    "navigation.indexes",
    "navigation.sections",
    "navigation.top",
    "navigation.tracking",
    "content.code.copy",
    "search.highlight",
]
icon.repo = "fontawesome/brands/github"

[[project.theme.palette]]
media = "(prefers-color-scheme)"
toggle.icon = "lucide/sun-moon"
toggle.name = "Switch to light mode"

[[project.theme.palette]]
media = "(prefers-color-scheme: light)"
scheme = "default"
toggle.icon = "lucide/sun"
toggle.name = "Switch to dark mode"

[[project.theme.palette]]
media = "(prefers-color-scheme: dark)"
scheme = "slate"
toggle.icon = "lucide/moon"
toggle.name = "Switch to system preferences"

[project.markdown_extensions.pymdownx.superfences]
custom_fences = [
  { name = "mermaid", class = "mermaid", format = "pymdownx.superfences.fence_code_format" },
]